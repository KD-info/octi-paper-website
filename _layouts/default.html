<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>
    {%- if page.title -%}{{ page.title }} · {%- endif -%}{{ site.title }}
  </title>
  <meta name="description" content="{{ site.description | escape }}" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}" />
</head>

<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="site-header">
    <div class="container header-inner">
      <div class="brand">
        <img class="brand-logo" src="{{ '/assets/images/placeholders/octi-logo.svg' | relative_url }}" alt="Octi logo"
          width="44" height="44" loading="eager" />
        <div class="brand-text">
          <div class="brand-title">{{ site.title }}</div>
          <div class="brand-subtitle">{{ site.description }}</div>
        </div>
      </div>

      <nav class="header-actions" aria-label="Primary">
        <a class="btn btn-primary" href="https://octipad.s.studiumdigitale.uni-frankfurt.de/" target="_blank"
          rel="noopener noreferrer">
          Open OctiPad
        </a>
      </nav>
    </div>
  </header>

  <main id="main" class="site-main">
    <div class="container">
      {{ content }}
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div class="fineprint">
        <div>Octi is an LMS-integrated platform embedded via LTI. This page is a demonstration site for a research
          paper.</div>
        <div class="fineprint-muted">Placeholders are used for figures and branding until final assets are provided.
        </div>
      </div>
    </div>
  </footer>
</body>

</html>
